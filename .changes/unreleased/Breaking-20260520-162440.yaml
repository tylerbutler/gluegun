kind: Breaking
body: |-
    Refine Gluegun error and informational response types

    Add `error.UnsupportedFeature(String)` for preflight capability checks such as rejecting WebSocket upgrades on HTTP/2. BREAKING: `response.Informational` is now a named record (`Informational(status:, headers:)`) instead of a positional tuple, so callers must update construction and pattern matches.
