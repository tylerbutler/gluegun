kind: Added
body: |-
    TLS configuration builders for connection options

    Added a typed gluegun/tls module and connection.with_tls_opts so callers can configure peer verification, CA sources, TLS versions, SNI, and client certificate files instead of relying on Gun's historical insecure verify_none default.
