name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang and Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.2.1'
          rebar3-version: '3.26.0'
          gleam-version: '1.14.0'

      - name: Check formatting
        run: gleam format --check src test

      - name: Type check
        run: gleam check

      - name: Run tests
        run: gleam test

      - name: Build with warnings as errors
        run: gleam build --warnings-as-errors

  docs:
    runs-on: ubuntu-latest
    name: Docs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang and Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.2.1'
          rebar3-version: '3.26.0'
          gleam-version: '1.14.0'

      - name: Build documentation
        run: gleam docs build
