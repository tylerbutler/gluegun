name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang and Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.2.1'
          rebar3-version: '3.26.0'
          gleam-version: '1.14.0'

      - name: Check formatting
        run: gleam format --check src test

      - name: Type check
        run: gleam check

      - name: Run tests
        run: gleam test

      - name: Build with warnings as errors
        run: gleam build --warnings-as-errors

  docs:
    runs-on: ubuntu-latest
    name: Docs
    steps:
      - uses: actions/checkout@v4

      - name: Setup Erlang and Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27.2.1'
          rebar3-version: '3.26.0'
          gleam-version: '1.14.0'

      - name: Build documentation
        run: gleam docs build

  website:
    runs-on: ubuntu-latest
    name: Website
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install website dependencies
        run: pnpm install --frozen-lockfile
        working-directory: website

      - name: Check website
        run: pnpm check:astro
        working-directory: website

      - name: Build website
        run: pnpm build:site
        working-directory: website
