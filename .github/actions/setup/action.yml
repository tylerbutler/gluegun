name: "Setup Gleam Environment"
description: "Common setup steps for Gleam CI jobs"

inputs:
  node:
    description: "Whether to setup Node.js for JavaScript target"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Setup just
      uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # ratchet:extractions/setup-just@v4

    - name: Setup BEAM
      uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # ratchet:erlef/setup-beam@v1
      with:
        version-file: .tool-versions
        version-type: strict

    - name: Cache Gleam dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # ratchet:actions/cache@v6
      with:
        path: |
          build/packages
          ~/.cache/gleam
        key: gleam-${{ runner.os }}-${{ hashFiles('gleam.toml', 'manifest.toml') }}
        restore-keys: |
          gleam-${{ runner.os }}-

    - name: Download dependencies
      shell: bash
      run: just deps
